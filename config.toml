# =========================================================================
# JAMS configuration.
#
# Every tunable value lives here so behavior can be changed without editing
# code. Logic modules read from this file (loaded once via tomllib in
# src/config.py); no magic numbers in logic modules.
#
# The rubric is versioned: `scoring.version` is stored on each scored job so
# historical scores stay interpretable after the weights are tuned.
# =========================================================================

[llm]
# Structured-extraction model. Pinned here so the only LLM touchpoint is
# reproducible at the config level.
model = "claude-sonnet-4-6"
max_tokens = 2048

[dedup]
# Title-similarity thresholds for record linkage, applied AFTER blocking on
# normalized company name. rapidfuzz token_sort_ratio, 0-100.
confident_duplicate = 90   # >= this -> confident duplicate, attach listing
borderline_floor = 75      # [borderline_floor, confident_duplicate) -> ask the user

[followup]
# Time-based staleness, in days since the last status_event. Used to highlight
# idle applications in the pipeline. Computed, never manually set.
followup_days = 7          # applied job idle this long -> worth a nudge
ghosted_days = 21          # no response this long -> probably ghosted

[scoring]
# Active rubric version label, stored on each job as rubric_version.
version = "ats-v1"

[scoring.weights]
# ATS keyword-coverage weights. The score is a weighted blend of how many of
# the listing's required vs preferred skills already appear in the resume +
# LinkedIn text. Renormalized when a listing has only one of the two lists.
required_skill_coverage  = 0.70
preferred_skill_coverage = 0.30

[scoring.bands]
# Score thresholds (0-100) for the guidance label shown next to the number.
#   >= strong   -> "Strong match — apply as-is"
#   >= moderate -> "Moderate — consider adding the missing keywords"
#   <  moderate -> "Weak — update resume/LinkedIn or pass"
strong = 80
moderate = 50
